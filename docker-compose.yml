version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - ENV=production
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=redis://redis:6379
      - POOL_SIZE=50
      - MAX_CARDS_PER_REQUEST=20
      - LLM_CONCURRENCY=4
      - LLM_RETRIES=3
      - WARM_POOL_SIZE=3
      - WARM_BATCH_SIZE=5
      - WARM_REFILL_MAX_IN_FLIGHT=2
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
